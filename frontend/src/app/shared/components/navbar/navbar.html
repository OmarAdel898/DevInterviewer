<header class="sticky top-0 z-40 border-b border-base-300 bg-base-100/80 backdrop-blur shadow-sm">
  <div class="navbar mx-auto w-full max-w-7xl px-4 py-3 md:px-8">
    <div class="navbar-start">
      <a
        routerLink="/"
        class="group inline-flex items-center gap-3 rounded-2xl px-2 py-1 transition-all duration-300 hover:bg-base-200"
      >
        <span class="mask mask-squircle grid h-10 w-10 place-items-center border border-base-300 bg-base-200 shadow-sm">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="1.8"
            class="h-5 w-5 text-primary"
            aria-hidden="true"
          >
            <path d="M7 8L3 12L7 16" />
            <path d="M17 8L21 12L17 16" />
            <path d="M14 4L10 20" />
          </svg>
        </span>
        <div class="leading-tight">
          <p class="text-lg font-bold text-base-content">DevInterviewer</p>
          <p class="font-mono text-xs text-primary">interviews://live</p>
        </div>
      </a>
    </div>

    <div class="navbar-end gap-2">
      @if (authService.currentUser()) {
        <a
          routerLink="/dashboard"
          class="btn btn-ghost btn-sm border border-transparent transition-all duration-300 hover:border-base-300"
        >
          Dashboard
        </a>

        <div class="dropdown dropdown-end">
          <button
            tabindex="0"
            type="button"
            class="btn btn-ghost btn-circle avatar transition-all duration-300 hover:bg-base-200"
          >
            <div class="w-10 rounded-full border border-base-300 bg-base-200 text-primary">
              <span class="grid h-full place-items-center text-sm font-semibold">
                {{ authService.currentUser()?.fullName?.charAt(0) || 'U' }}
              </span>
            </div>
          </button>

          <ul
            tabindex="0"
            class="menu dropdown-content glass mt-3 w-64 rounded-2xl border border-base-300 bg-base-100/90 p-2 shadow-xl backdrop-blur"
          >
            <li class="menu-title px-3 py-2">
              <span class="text-base-content">{{ authService.currentUser()?.fullName }}</span>
              <span class="font-mono text-xs text-primary">Signed in</span>
            </li>
            <li>
              <button type="button" class="transition-all duration-300 hover:bg-base-200">Profile</button>
            </li>
            <li>
              <button type="button" class="transition-all duration-300 hover:bg-base-200" (click)="logout()">Logout</button>
            </li>
          </ul>
        </div>
      } @else {
        <a routerLink="/login" class="btn btn-ghost btn-sm transition-all duration-300 hover:bg-base-200">Login</a>
        <a routerLink="/register" class="btn btn-primary btn-sm transition-all duration-300 hover:shadow-xl">Get Started</a>
      }
    </div>
  </div>
</header>
