<h1>Interview Room</h1>
<h1>{{code()}}</h1>
<textarea
class="editor-input h-full w-full resize-none border-0 bg-slate-900 p-3 text-sm leading-6 text-slate-100 outline-none"
[value]="code()"
(input)="onCodeUpdate($any($event.target).value)"
spellcheck="false"
autocomplete="off"
autocorrect="off"
autocapitalize="off"
></textarea>
<button (click)="onSave()">Save Code</button>
<button class="btn btn-primary" (click)="run()">Run Code</button>
<section class="card flex min-h-0 flex-1 border border-base-300 bg-base-100 shadow-sm">
					<div class="card-body flex min-h-0 flex-1 p-4">
						<div class="mb-3 flex items-center justify-between">
							<h2 class="card-title text-base">Console Output</h2>
							<button class="btn btn-xs btn-outline" >Clear</button>
						</div>

						<div class="console-shell min-h-0 flex-1 overflow-auto rounded-lg bg-slate-950 p-3 font-mono text-sm text-slate-100">
							@if (output()) {
								<pre class="whitespace-pre-wrap">{{ output() }}</pre>
							} @else {
								<p class="text-slate-400">No output yet. Click "Run Code" to execute.</p>
							}
						</div>
					</div>
				</section>
